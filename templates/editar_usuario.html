<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar Usuario - Access Pro</title>
    <link rel="icon" href="/static/pestana.png">   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
                    }
                } 
            } 
        }
    </script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .input-glass { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        .input-glass:focus { border-color: rgba(59, 130, 246, 0.5); background: rgba(59, 130, 246, 0.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
        
        @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
        .animate-blob { animation: blob 7s infinite alternate; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-200 min-h-screen flex flex-col font-sans overflow-hidden">

    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-600/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 2s"></div>
    </div>

    <header class="glass sticky top-0 z-50 px-8 py-5 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-brand-600/20 rounded-xl flex items-center justify-center border border-brand-500/30">
                <span class="text-brand-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </span>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white leading-none">Edición de Perfil</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-[0.2em] mt-1 font-semibold">ID de Registro: #{{ usuario.id }}</p>
            </div>
        </div>
        <a href="/usuarios" class="group flex items-center gap-2 px-4 py-2 hover:bg-white/5 rounded-xl text-sm font-bold text-slate-400 hover:text-white transition-all">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> Volver
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 relative z-10">
        <section class="glass max-w-2xl w-full p-10 md:p-12 rounded-[3rem] shadow-2xl relative">
            
            <div class="mb-10">
                <h2 class="text-3xl font-black text-white tracking-tight mb-2">Modificar Credenciales</h2>
                <p class="text-slate-400 text-sm">Actualice la información de acceso del usuario de forma segura.</p>
            </div>

            <form method="POST" class="space-y-8">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    
                    <div class="md:col-span-2 group">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-1 group-focus-within:text-brand-400 transition-colors">Nombre Completo del Titular</label>
                        <input type="text" name="name" value="{{ usuario.name }}" required 
                            class="w-full px-6 py-4 input-glass rounded-2xl text-white font-medium focus:outline-none placeholder-slate-600"
                            placeholder="Nombre y Apellido">
                    </div>
                    
                    <div class="group">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-1 group-focus-within:text-emerald-400 transition-colors">Código RFID (Lectura)</label>
                        <div class="relative">
                            <input type="text" name="rfid" value="{{ usuario.rfid }}" required 
                                class="w-full px-6 py-4 input-glass rounded-2xl text-emerald-400 font-mono font-bold focus:outline-none"
                                placeholder="HEX-CODE">
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded-md border border-emerald-500/20">Activo</span>
                        </div>
                    </div>

                    <div class="group">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 ml-1 group-focus-within:text-brand-400 transition-colors">Nombre de Usuario</label>
                        <input type="text" name="username" value="{{ usuario.username }}" required 
                            class="w-full px-6 py-4 input-glass rounded-2xl text-white focus:outline-none"
                            placeholder="username">
                    </div>

                    <div class="md:col-span-2 group">
                        <div class="flex justify-between items-center mb-3 ml-1">
                            <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest group-focus-within:text-brand-400 transition-colors">Nueva Contraseña de Acceso</label>
                            <span class="text-[9px] text-amber-500/80 font-bold uppercase tracking-tighter bg-amber-500/5 px-2 py-0.5 rounded border border-amber-500/10">Opcional</span>
                        </div>
                        <input type="password" name="password" 
                            class="w-full px-6 py-4 input-glass rounded-2xl text-white focus:outline-none placeholder-slate-700"
                            placeholder="••••••••••••">
                        <p class="text-[10px] text-slate-500 mt-3 px-1 flex items-center gap-2">
                            <span class="w-1 h-1 rounded-full bg-slate-600"></span>
                            Mantenga este campo vacío para conservar la contraseña actual.
                        </p>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" class="w-full relative group overflow-hidden bg-brand-600 hover:bg-brand-500 text-white font-black py-5 rounded-2xl transition-all shadow-2xl shadow-brand-600/30 active:scale-[0.98]">
                        <span class="relative z-10 flex items-center justify-center gap-2">
                            Guardar Cambios
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                            </svg>
                        </span>
                        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer class="text-center py-6 text-slate-600 text-[10px] font-bold uppercase tracking-[0.3em]">
        Security Protocol v2.0 • Pereira
    </footer>

</body>
</html>
