<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Nueva Instalación - Access Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-xl w-full">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-black mb-2">Crear Instalación</h1>
            <p class="text-slate-400">Configura un nuevo espacio de préstamo.</p>
        </header>

        <form action="/agregar_instalacion" method="POST" enctype="multipart/form-data" class="glass p-10 rounded-[2.5rem] space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-3 ml-1">Nombre del Espacio</label>
                <input type="text" name="nombre" required placeholder="Ej: Laboratorio de Redes" class="w-full bg-slate-900 border border-white/5 rounded-2xl px-6 py-4 outline-none focus:border-blue-500/50 transition-all">
            </div>
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-3 ml-1">Descripción</label>
                <textarea name="descripcion" rows="3" placeholder="Detalles de la ubicación o recursos..." class="w-full bg-slate-900 border border-white/5 rounded-2xl px-6 py-4 outline-none focus:border-blue-500/50 transition-all resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-3 ml-1">Imagen de Referencia</label>
                <div class="relative group">
                    <input type="file" name="imagen" id="imgInput" accept="image/*" class="hidden">
                    <label for="imgInput" class="cursor-pointer block w-full bg-slate-900 border-2 border-dashed border-white/10 rounded-2xl p-8 text-center hover:border-blue-500/40 transition-all overflow-hidden relative">
                        <div id="previewContainer" class="hidden absolute inset-0">
                            <img id="previewImg" class="w-full h-full object-cover">
                        </div>
                        <div id="uploadPrompt" class="space-y-2">
                            <span class="text-3xl">🖼️</span>
                            <p class="text-sm text-slate-400">Haz clic para subir o arrastra una imagen</p>
                        </div>
                    </label>
                </div>
            </div>

            <div class="pt-4 flex gap-4">
                <a href="/admin_instalaciones" class="flex-1 text-center py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold transition-all">Cancelar</a>
                <button type="submit" class="flex-[2] py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-lg shadow-blue-600/20 transition-all">Guardar Instalación</button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('imgInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('previewImg').src = URL.createObjectURL(file);
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('uploadPrompt').classList.add('opacity-0');
            }
        }
    </script>
</body>
</html>
