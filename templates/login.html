<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo</title>
    <link rel="icon" href="/static/pestana.png">   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 8s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                } 
            } 
        }
    </script>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-5%] w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-[120px] animate-pulse-slow"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-[500px] h-[500px] bg-blue-600/10 rounded-full blur-[120px] animate-pulse-slow"></div>

    <div class="w-full max-w-md z-10">
        <div class="bg-slate-900/40 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-2xl p-10 relative overflow-hidden">
            
            <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent"></div>

            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500/10 rounded-2xl mb-4 border border-emerald-500/20">
                    <i class="fas fa-shield-halved text-2xl text-emerald-500">C</i>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Bienvenid@</h1>
                <p class="text-slate-400 mt-2 font-medium">Inicia Sesión aquí</p>
            </div>

            <form method="POST" class="space-y-5">
                <div class="group">
                    <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Usuario</label>
                    <div class="relative group-focus-within:scale-[1.01] transition-transform duration-200">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="text" id="username" name="username" placeholder="admin_user" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all">
                    </div>
                </div>

                <div class="group">
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Contraseña</label>
                    <div class="relative group-focus-within:scale-[1.01] transition-transform duration-200">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-key text-slate-500 group-focus-within:text-emerald-500 transition-colors"></i>
                        </div>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full group relative overflow-hidden bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-4 px-6 rounded-2xl transition-all duration-300 shadow-lg shadow-emerald-500/20 active:scale-95">
                    <span class="relative z-10 flex items-center justify-center gap-2">
                        Ingresar al Sistema
                        <i class="fas fa-arrow-right text-sm transition-transform group-hover:translate-x-1"></i>
                    </span>
                </button>

                <div class="text-center pt-2">
                    <a href="#" class="text-sm text-slate-500 hover:text-emerald-400 transition-colors duration-200 font-medium">
                        ¿Problemas para acceder? <span class="underline decoration-emerald-500/30 underline-offset-4">Soporte Técnico</span>
                    </a>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-500 text-xs mt-8 font-medium">
            &copy; 2026 Admin Dashboard &bull; Seguridad Encriptada
        </p>
    </div>
</body>
</html>
