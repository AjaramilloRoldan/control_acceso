<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Usuario</title>
    <link rel="icon" href="/static/pestana.png">   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }
    </script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800/80 backdrop-blur-md border-b border-slate-700/50 px-6 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white tracking-wide">Nuevo Usuario</h1>
        <a href="/usuarios" class="px-4 py-2 border border-slate-600 rounded-full text-sm font-semibold text-slate-300 hover:bg-slate-700 hover:text-white transition-all">
            ⬅ Cancelar
        </a>
    </header>

    <main class="flex-grow max-w-2xl w-full mx-auto p-6 md:p-8 flex flex-col justify-center">
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-8 text-center">Registrar Nuevo Acceso</h2>
            
            <form method="POST" class="space-y-6">
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-400 mb-2">Nombre</label>
                    <input type="text" id="name" name="name" required 
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                </div>
                <div>
                    <label for="rfid" class="block text-sm font-medium text-slate-400 mb-2">RFID</label>
                    <input type="text" id="rfid" name="rfid" required 
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl font-mono text-emerald-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                </div>
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-400 mb-2">Usuario</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-400 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-colors">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-3 px-8 rounded-xl transition-all shadow-[0_4px_14px_rgba(16,185,129,0.3)]">
                        Agregar Usuario
                    </button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
